name: Mixamo Animation Downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python packages
        run: |
          pip install "calapy==0.0.9" selenium webdriver-manager

      - name: Run Mixamo Bot
        env:
          MIXAMO_EMAIL: ${{ secrets.MIXAMO_EMAIL }}
          MIXAMO_PASSWORD: ${{ secrets.MIXAMO_PASSWORD }}
        run: |
          python download_animations.py

      - name: Upload downloaded FBX files
        uses: actions/upload-artifact@v4
        with:
          name: mixamo-fbx-animations
          path: mixamo_dataset/
          retention-days: 7